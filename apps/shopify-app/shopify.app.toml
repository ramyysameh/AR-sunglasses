# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f2a93eb007cec5748830afd8ccd04203"
name = "AR Try-on"
application_url = "https://ar-sunglasses-shopify-app.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-10"
# Lifecycle webhook subscriptions removed for local dev (--use-localhost can't register
# localhost webhook URIs). Not needed for this slice; restore before production (sub-project D).

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions"

[auth]
# Path is /auth/callback, not the legacy /api/auth: shopify.server.js sets
# authPathPrefix "/auth", so OAuth returns through app/routes/auth.$.jsx.
redirect_urls = [ "https://ar-sunglasses-shopify-app.vercel.app/auth/callback" ]
