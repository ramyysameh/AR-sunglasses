<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AR sunglasses try-on prototype using webcam feed" />
    <title>AR Try-On Prototype</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="ar-container">
      <video id="camera-feed" autoplay playsinline muted style="position:absolute; top:0; left:0; width:100%; height:100%"></video>
      <canvas id="overlay-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%"></canvas>
      <div id="loading">Loading model...</div>
      <button id="capture-btn" type="button">Try & Share</button>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
