<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="AR sunglasses virtual try-on studio" />
    <title>AR Try-On Studio</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="ar-container">
      <video id="camera-feed" autoplay playsinline muted></video>
      <canvas id="overlay-canvas"></canvas>
      <div id="loading">Loading model...</div>

      <aside id="model-sidebar" class="model-sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <span class="sidebar-title">Try-On Studio</span>
            <span class="sidebar-subtitle">Choose a frame</span>
          </div>
          <button id="sidebar-collapse" class="icon-btn" type="button" aria-label="Hide panel">‹</button>
        </div>
        <div id="model-list" class="model-list" role="listbox" aria-label="Glasses models"></div>
      </aside>

      <button id="sidebar-open" class="sidebar-open icon-btn" type="button" aria-label="Show frames" hidden>
        <span class="sidebar-open-icon">☰</span>
        <span class="sidebar-open-label">Frames</span>
      </button>

      <button id="capture-btn" type="button">
        <span class="capture-dot"></span>
        Capture
      </button>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
